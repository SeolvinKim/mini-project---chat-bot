services:
  # Gradio 메인 앱 (버튼 기반 Tool UI)
  - type: web
    name: job-prep-chatbot
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python app/main.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false

  # FastAPI HTTP API (vtuber 프론트엔드가 호출: /api/chat, /api/tts)
  - type: web
    name: job-prep-chatbot-api
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      # Azure TTS는 선택 사항. 키를 안 넣으면 OPENAI TTS로 동작(.env.example 참고).
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false

  # vtuber 정적 프론트엔드 (VRM 아바타)
  - type: web
    name: job-prep-chatbot-vtuber
    runtime: static
    buildCommand: cd vtuber && npm install && npm run build
    staticPublishPath: ./vtuber/dist
    envVars:
      # job-prep-chatbot-api 서비스의 실제 URL(예: https://job-prep-chatbot-api.onrender.com)을
      # Render 대시보드에서 직접 입력한다. Vite 빌드 시점에 값이 박히므로,
      # API 서비스 URL이 바뀌면 이 값을 갱신하고 vtuber를 다시 배포해야 한다.
      - key: VITE_CHAT_API
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
