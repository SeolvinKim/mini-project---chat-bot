services:
  - type: web
    name: job-prep-chatbot
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python app/main.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
